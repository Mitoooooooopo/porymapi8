name: Build Porymap for Alpine aarch64

on: push

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    container:
      image: alpine:3.21
      options: --platform linux/arm64

    steps:
      - name: Set up repos
        run: |
          cat > /etc/apk/repositories << 'EOF'
          https://dl-cdn.alpinelinux.org/alpine/v3.21/main
          https://dl-cdn.alpinelinux.org/alpine/v3.21/community
          EOF
          apk update

      - name: Install dependencies
        run: |
          apk add --no-cache \
            git \
            qt6-qtbase-dev \
            qt6-qtcharts-dev \
            qt6-qtdeclarative-dev \
            qt6-qttools-dev \
            qt6-qtsvg-dev \
            build-base

      - name: Clone Porymap
        run: git clone --depth=1 https://github.com/huderlem/porymap

      - name: Patch vendored giflib for giflib 5.2+ compatibility
        working-directory: porymap
        run: |
          GIF_H="src/vendor/QtGifImage/3rdParty/giflib/gif_lib.h"
          GIF_CPP="src/vendor/QtGifImage/gifimage/qgifimage.cpp"

          # Fix _Bool — giflib 5.2 removed it, add it back as int
          sed -i 's/#define BOOL _Bool/#ifndef BOOL\n#define BOOL int\n#endif/' "$GIF_H"

          # Add back removed fields into their structs so the C files compile unchanged
          # SortFlag belonged to ColorMapObject
          sed -i 's/} ColorMapObject;/    BOOL SortFlag;\n} ColorMapObject;/' "$GIF_H"

          # Interlace belonged to GifImageDesc
          sed -i 's/} GifImageDesc;/    BOOL Interlace;\n} GifImageDesc;/' "$GIF_H"

          # UserInputFlag belonged to GraphicsControlBlock
          sed -i 's/} GraphicsControlBlock;/    BOOL UserInputFlag;\n} GraphicsControlBlock;/' "$GIF_H"

          # Fix qgifimage.cpp usages that reference fields qgifimage itself uses
          # These are safe because we're only touching the Qt wrapper, not giflib internals
          sed -i '/cmap->SortFlag/d'                                        "$GIF_CPP"
          sed -i 's/gifImage\.ImageDesc\.Interlace/0/g'                     "$GIF_CPP"
          sed -i '/gifImage->ImageDesc\.Interlace = frameInfo\.interlace/d' "$GIF_CPP"
          sed -i '/gcbBlock\.UserInputFlag/d'                                "$GIF_CPP"
      - name: Build
        working-directory: porymap
        run: |
          qmake6
          make -j$(nproc)

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: porymap-alpine-aarch64-musl
          path: porymap/porymap
