name: Build Porymap for Alpine aarch64 (musl)
permissions:
      contents: write
      
on: push

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    container:
      image: alpine:3.21
      options: --platform linux/arm64

    steps:
      - name: Set up repos
        run: |
          cat > /etc/apk/repositories << 'EOF'
          https://dl-cdn.alpinelinux.org/alpine/v3.21/main
          https://dl-cdn.alpinelinux.org/alpine/v3.21/community
          EOF
          apk update

      - name: Install dependencies
        run: |
          apk add --no-cache \
            git \
            qt6-qtbase-dev \
            qt6-qtcharts-dev \
            qt6-qtdeclarative \
            qt6-qtsvg-dev \
            qt6-qttools-dev \
            build-base

      - name: Clone Porymap
        run: git clone --depth=1 https://github.com/huderlem/porymap

      - name: Patch vendored giflib for giflib 5.2+ and C++ compatibility
        working-directory: porymap
        run: |
          GIF_H="src/vendor/QtGifImage/3rdParty/giflib/gif_lib.h"
          GIF_CPP="src/vendor/QtGifImage/gifimage/qgifimage.cpp"

          # _Bool is C99 only — not valid in C++, replace with int
          sed -i 's/#define BOOL _Bool/#define BOOL int/' "$GIF_H"

          # Remove the 5 usages of fields dropped in giflib 5.2
          sed -i '/cmap->SortFlag = false;/d'                                                "$GIF_CPP"
          sed -i 's/frameInfo\.interlace = gifImage\.ImageDesc\.Interlace;/frameInfo.interlace = false;/' "$GIF_CPP"
          sed -i 's/if (gifImage\.ImageDesc\.Interlace)/if (false)/'                        "$GIF_CPP"
          sed -i '/gifImage->ImageDesc\.Interlace = frameInfo\.interlace;/d'                "$GIF_CPP"
          sed -i '/gcbBlock\.UserInputFlag = false;/d'                                      "$GIF_CPP"

      - name: Build
        working-directory: porymap
        run: |
          qmake6 -config release porymap.pro
          make -j$(nproc)

      - name: Upload binary to release
        run: |
          apk add --no-cache curl jq

          # Get the release ID by tag name "latest"
          RELEASE_ID=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/latest" \
            | jq -r '.id')

          echo "Release ID: $RELEASE_ID"

          # Upload the binary
          curl -L \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/octet-stream" \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/${RELEASE_ID}/assets?name=porymap-alpine-aarch64-musl" \
            --data-binary @porymap/porymap
