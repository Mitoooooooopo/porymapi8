name: Build Porymap for Alpine aarch64

on: push

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    container:
      image: alpine:3.21
      options: --platform linux/arm64

    steps:
      - name: Set up repos
        run: |
          cat > /etc/apk/repositories << 'EOF'
          https://dl-cdn.alpinelinux.org/alpine/v3.21/main
          https://dl-cdn.alpinelinux.org/alpine/v3.21/community
          EOF
          apk update

      - name: Install dependencies
        run: |
          apk add --no-cache \
            git \
            curl \
            tar \
            make \
            qt6-qtbase-dev \
            qt6-qtcharts-dev \
            qt6-qtdeclarative-dev \
            qt6-qttools-dev \
            qt6-qtsvg-dev \
            build-base

      - name: Build giflib 5.1.4 from source
        run: |
          curl -L https://sourceforge.net/projects/giflib/files/giflib-5.1.4.tar.gz/download \
            -o giflib-5.1.4.tar.gz
          tar xf giflib-5.1.4.tar.gz
          cd giflib-5.1.4
          make
          make install PREFIX=/usr/local
          # make sure the old .so is found first
          echo /usr/local/lib >> /etc/ld-musl-aarch64.path

      - name: Clone and build Porymap
        run: |
          git clone --depth=1 https://github.com/huderlem/porymap
          cd porymap
          qmake6 INCLUDEPATH+=/usr/local/include LIBS+="-L/usr/local/lib -lgif"
          make -j$(nproc)

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: porymap-alpine-aarch64-musl
          path: porymap/porymap
