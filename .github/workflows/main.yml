name: Build Porymap for Alpine aarch64

on: push

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    container:
      image: alpine:3.21
      options: --platform linux/arm64

    steps:
      - name: Set up repos
        run: |
          cat > /etc/apk/repositories << 'EOF'
          https://dl-cdn.alpinelinux.org/alpine/v3.21/main
          https://dl-cdn.alpinelinux.org/alpine/v3.21/community
          EOF
          apk update

      - name: Install dependencies
        run: |
          apk add --no-cache \
            git \
            qt6-qtbase-dev \
            qt6-qtcharts-dev \
            qt6-qtdeclarative-dev \
            qt6-qttools-dev \
            qt6-qtsvg-dev \
            build-base

      - name: Clone Porymap
        run: git clone --depth=1 https://github.com/huderlem/porymap

      - name: Patch vendored giflib for giflib 5.2+ compatibility
        working-directory: porymap
        run: |
          GIF_H="src/vendor/QtGifImage/3rdParty/giflib/gif_lib.h"
          GIF_CPP="src/vendor/QtGifImage/gifimage/qgifimage.cpp"
          DGIF_C="src/vendor/QtGifImage/3rdParty/giflib/dgif_lib.c"

          # Fix _Bool
          sed -i 's/#define BOOL _Bool/#ifndef BOOL\n#define BOOL int\n#endif/' "$GIF_H"

          # Remove fields removed in giflib 5.2 from header
          sed -i '/BOOL SortFlag;/d'      "$GIF_H"
          sed -i '/BOOL Interlace;/d'     "$GIF_H"
          sed -i '/BOOL UserInputFlag;/d' "$GIF_H"

          # Fix function signatures in header
          sed -i 's/const BOOL GifTestExistence,/int GifTestExistence,/' "$GIF_H"
          sed -i 's/const BOOL GifInterlace,/int GifInterlace,/'         "$GIF_H"
          sed -i 's/const BOOL gif89/int gif89/'                          "$GIF_H"

          # Fix qgifimage.cpp — use full member path to avoid mangling struct name
          sed -i '/cmap->SortFlag/d'                                              "$GIF_CPP"
          sed -i 's/gifImage\.ImageDesc\.Interlace/0/g'                           "$GIF_CPP"
          sed -i '/gifImage->ImageDesc\.Interlace = frameInfo\.interlace/d'       "$GIF_CPP"
          sed -i '/gcbBlock\.UserInputFlag/d'                                      "$GIF_CPP"

          # Fix dgif_lib.c — be specific, never use bare .Interlace or .UserInputFlag
          sed -i 's/sp->ImageDesc\.Interlace/0/g'                                 "$DGIF_C"
          sed -i 's/GCB->UserInputFlag\s*=\s*[^;]*;/GCB->Padding = 0;/g'         "$DGIF_C"
      - name: Build
        working-directory: porymap
        run: |
          qmake6
          make -j$(nproc)

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: porymap-alpine-aarch64-musl
          path: porymap/porymap
