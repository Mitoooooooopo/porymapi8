name: Build Porymap for Alpine aarch64

on: push

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    container:
      image: alpine:3.21
      options: --platform linux/arm64

    steps:
      - name: Set up repos
        run: |
          cat > /etc/apk/repositories << 'EOF'
          https://dl-cdn.alpinelinux.org/alpine/v3.21/main
          https://dl-cdn.alpinelinux.org/alpine/v3.21/community
          EOF
          apk update

      - name: Install dependencies
        run: |
          apk add --no-cache \
            git \
            qt6-qtbase-dev \
            qt6-qtcharts-dev \
            qt6-qtdeclarative-dev \
            qt6-qttools-dev \
            qt6-qtsvg-dev \
            build-base

      - name: Install autoconf for giflib build
        run: apk add --no-cache autoconf automake libtool wget

      - name: Build and install giflib 5.1.4
        run: |
          apk add --no-cache autoconf automake libtool
          wget -O giflib-5.1.4.tar.bz2 \
            "https://downloads.sourceforge.net/project/giflib/giflib-5.x/giflib-5.1.4.tar.gz?ts=gAAAAABqAXcL1ykEL5Vbpf7AO7WvbmQynYHa5XQdU3miop8C_8erdVHXkzega-kPf70V_profTBD6_DHuKnd86yqKwHfubUi2A%3D%3D&use_mirror=yer&r=https%3A%2F%2Fsourceforge.net%2Fprojects%2Fgiflib%2Ffiles%2Fgiflib-5.x%2F"
          tar xf giflib-5.1.4.tar.bz2
          cd giflib-5.1.4
          autoreconf -fi
          ./configure --prefix=/usr --disable-static
          make
          make install

      - name: Clone and build Porymap
        run: |
          git clone --depth=1 https://github.com/huderlem/porymap
          cd porymap
          qmake6
          make -j$(nproc)

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: porymap-alpine-aarch64-musl
          path: porymap/porymap
