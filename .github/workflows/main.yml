name: Build Porymap for Alpine aarch64

on: push

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    container:
      image: alpine:3.18
      options: --platform linux/arm64

    steps:
      - name: Enable community repo
        run: |
          echo "https://dl-cdn.alpinelinux.org/alpine/edge/community" >> /etc/apk/repositories
          apk update

      - name: Install dependencies
        run: |
          apk add --no-cache \
            git \
            qt6-qtbase-dev \
            qt6-qtcharts-dev \
            qt6-qtdeclarative-dev \
            qt6-qttools-dev \
            qt6-qtsvg-dev \
            build-base

      - name: Clone and build Porymap
        run: |
          git clone --depth=1 https://github.com/huderlem/porymap
          cd porymap
          qmake6
          make -j8

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: porymap-alpine-aarch64-musl
          path: porymap/porymap
