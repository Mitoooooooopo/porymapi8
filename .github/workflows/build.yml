name: Build Porymap for Alpine aarch64

on: push

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    container:
      image: alpine:latest
      options: --platform linux/arm64

    steps:
      - name: Install dependencies
        run: |
          apk add --no-cache \
            git \
            qt6-base-dev \
            qt6-declarative-dev \
            qt6-charts-dev \
            qt6-tools-dev \
            build-base

      - name: Clone and build Porymap
        run: |
          git clone --depth=1 https://github.com/huderlem/porymap
          cd porymap
          qmake6
          make -j8

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: porymap-alpine-aarch64-musl
          path: porymap/porymap
